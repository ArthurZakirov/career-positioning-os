- id: deployment-checklist-automation
  title: Deployment checklist automation
  status: locally_functional
  privacy: public_safe
  source_files:
    - examples/source-notes/deployment-checklist-automation.md
  one_line_private: Turned a fictional deployment checklist into a local assistant that verifies prerequisites and drafts a deployment note.
  one_line_public: Converted a manual deployment checklist into a local assistant that checks prerequisites and prepares a human-reviewed deployment note.
  situation: A fictional team had a checklist-driven release process with repeated manual checks.
  stakes: Missing a precondition could delay the release or create avoidable follow-up work.
  constraints: The assistant could verify some prerequisites but should not deploy or notify stakeholders without approval.
  actions:
    - Converted the checklist into explicit preconditions.
    - Added local verification commands.
    - Drafted a release note template from checked items.
    - Kept final deployment and notification as human-approved steps.
  mechanism: Turn checklist items into executable checks, then use the checked state to draft the next action.
  results:
    - Made the checklist easier to run consistently.
    - Preserved human control over release execution.
  metrics:
    - value: "local prototype"
      confidence: exact
      public_safe: true
      caveat: Locally functional example; not a deployed service.
  caveats:
    - This is dummy data and should not be represented as a real achievement.
    - The assistant verifies prerequisites but does not perform release actions.
